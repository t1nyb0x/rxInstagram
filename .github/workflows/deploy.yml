name: deploy

on:
  workflow_run:
    workflows: [push-image]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Deploy Webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          PAYLOAD='{"event":"deploy"}'
          SIGNATURE="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -binary | xxd -p -c 256)"

          HTTP_STATUS=$(curl -sS -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            --data "$PAYLOAD" \
            --max-time 15 \
            "$WEBHOOK_URL")

          echo "Response: $(cat /tmp/webhook_response.txt)"
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "202" ]; then
            echo "::error::Webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Deploy webhook triggered successfully"
